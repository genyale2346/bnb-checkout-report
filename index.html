<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Checkout e Lavanderia</title>
<style>
body{
  font-family: Arial, sans-serif;
  max-width: 1400px;
  margin: auto;
  padding: 30px;
  background: #f4f4f4;
}
.box{
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.08);
}
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:end;
}
label{
  display:block;
  font-weight:bold;
  margin-bottom:4px;
}
input,button{
  padding:10px;
  font-size:16px;
}
button{
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
button.secondary{background:#198754;}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
  background:white;
}
th,td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}
th{background:#efefef;}
td:first-child, th:first-child,
td:nth-child(2), th:nth-child(2){
  text-align:left;
}
.message{margin-top:15px;font-weight:bold;}
.error{color:#b00020;}
.success{color:#198754;}
.summary{
  margin-top:20px;
  padding:15px;
  background:#eef6ff;
  border-radius:8px;
}
.section-title{
  margin-top:30px;
}
</style>
</head>
<body>

<div class="box">
  <h1>Report Checkout e Lavanderia</h1>

  <div class="controls">
    <div>
      <label>Dal</label>
      <input type="date" id="from">
    </div>

    <div>
      <label>Al</label>
      <input type="date" id="to">
    </div>

    <div>
      <label>Costo lavanderia totale €</label>
      <input type="number" id="laundryCost" step="0.01" placeholder="es. 900">
    </div>

    <button onclick="loadReport()">Calcola</button>
    <button class="secondary" onclick="downloadCSV()">Scarica CSV</button>
  </div>

  <div id="message" class="message"></div>
  <div id="summary" class="summary" style="display:none;"></div>

  <h2 class="section-title">Report per camere</h2>
  <div id="roomTable"></div>

  <h2 class="section-title">Report per strutture</h2>
  <div id="structureTable"></div>
</div>

<script>
let currentData = null;
let currentLaundryCost = 0;
let currentCostPerCheckout = 0;

function euro(value){
  return new Intl.NumberFormat("it-IT", {
    style: "currency",
    currency: "EUR"
  }).format(value || 0);
}

function setDefaultDates(){
  const today = new Date();
  const start = new Date(today.getFullYear(), 0, 1);

  document.getElementById("from").value = start.toISOString().slice(0,10);
  document.getElementById("to").value = today.toISOString().slice(0,10);
}

async function loadReport(){
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const laundryCost = parseFloat(document.getElementById("laundryCost").value || "0");

  const message = document.getElementById("message");
  const roomTable = document.getElementById("roomTable");
  const structureTable = document.getElementById("structureTable");
  const summary = document.getElementById("summary");

  if(!from || !to){
    message.className = "message error";
    message.innerText = "Inserisci entrambe le date.";
    return;
  }

  message.className = "message";
  message.innerText = "Caricamento dati da CiaoBooking...";
  roomTable.innerHTML = "";
  structureTable.innerHTML = "";
  summary.style.display = "none";

  try{
    const res = await fetch(`/api/report?from=${from}&to=${to}`);
    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || "Errore sconosciuto");
    }

    currentData = data;
    currentLaundryCost = laundryCost;
    currentCostPerCheckout = data.totalCheckout > 0 ? laundryCost / data.totalCheckout : 0;

    renderSummary(data, laundryCost, currentCostPerCheckout);
    renderRoomTable(data, currentCostPerCheckout);
    renderStructureTable(data, currentCostPerCheckout);

    message.className = "message success";
    message.innerText = "Report caricato correttamente.";
  }catch(err){
    message.className = "message error";
    message.innerText = "Errore: " + err.message;
  }
}

function renderSummary(data, laundryCost, costPerCheckout){
  const summary = document.getElementById("summary");
  summary.style.display = "block";

  summary.innerHTML = `
    <strong>Totale checkout:</strong> ${data.totalCheckout}<br>
    <strong>Costo lavanderia totale:</strong> ${euro(laundryCost)}<br>
    <strong>Costo medio per checkout:</strong> ${euro(costPerCheckout)}
  `;
}

function renderRoomTable(data, costPerCheckout){
  let html = "<table><thead><tr><th>Struttura</th><th>Camera</th>";

  data.months.forEach(m => {
    html += `<th>${m.label}</th>`;
  });

  html += "<th>Totale checkout</th><th>Costo lavanderia</th></tr></thead><tbody>";

  if(data.rows.length === 0){
    html += `<tr><td colspan="${data.months.length + 4}">Nessun checkout trovato nel periodo selezionato.</td></tr>`;
  }

  data.rows.forEach(row => {
    const cost = row.total * costPerCheckout;

    html += `<tr><td>${row.struttura}</td><td>${row.camera}</td>`;

    row.values.forEach(v => {
      html += `<td>${v}</td>`;
    });

    html += `<td><strong>${row.total}</strong></td><td><strong>${euro(cost)}</strong></td></tr>`;
  });

  html += "</tbody></table>";
  document.getElementById("roomTable").innerHTML = html;
}

function renderStructureTable(data, costPerCheckout){
  let html = "<table><thead><tr><th>Struttura</th>";

  data.months.forEach(m => {
    html += `<th>${m.label}</th>`;
  });

  html += "<th>Totale checkout</th><th>Costo lavanderia</th></tr></thead><tbody>";

  if(!data.structures || data.structures.length === 0){
    html += `<tr><td colspan="${data.months.length + 3}">Nessuna struttura trovata nel periodo selezionato.</td></tr>`;
  }

  (data.structures || []).forEach(row => {
    const cost = row.total * costPerCheckout;

    html += `<tr><td>${row.struttura}</td>`;

    row.values.forEach(v => {
      html += `<td>${v}</td>`;
    });

    html += `<td><strong>${row.total}</strong></td><td><strong>${euro(cost)}</strong></td></tr>`;
  });

  html += "</tbody></table>";
  document.getElementById("structureTable").innerHTML = html;
}

function downloadCSV(){
  if(!currentData){
    alert("Prima calcola il report.");
    return;
  }

  const lines = [];

  lines.push("REPORT PER CAMERE");
  lines.push(["Struttura", "Camera", ...currentData.months.map(m => m.label), "Totale checkout", "Costo lavanderia"].join(";"));

  currentData.rows.forEach(row => {
    const cost = row.total * currentCostPerCheckout;
    lines.push([
      row.struttura,
      row.camera,
      ...row.values,
      row.total,
      cost.toFixed(2).replace(".", ",")
    ].join(";"));
  });

  lines.push("");
  lines.push("REPORT PER STRUTTURE");
  lines.push(["Struttura", ...currentData.months.map(m => m.label), "Totale checkout", "Costo lavanderia"].join(";"));

  (currentData.structures || []).forEach(row => {
    const cost = row.total * currentCostPerCheckout;
    lines.push([
      row.struttura,
      ...row.values,
      row.total,
      cost.toFixed(2).replace(".", ",")
    ].join(";"));
  });

  lines.push("");
  lines.push(["Totale checkout", currentData.totalCheckout].join(";"));
  lines.push(["Costo lavanderia totale", currentLaundryCost.toFixed(2).replace(".", ",")].join(";"));
  lines.push(["Costo medio per checkout", currentCostPerCheckout.toFixed(2).replace(".", ",")].join(";"));

  const blob = new Blob([lines.join("\n")], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "report-checkout-lavanderia.csv";
  a.click();
  URL.revokeObjectURL(url);
}

setDefaultDates();
</script>

</body>
</html>
